name: CI - CBKAssetConverter

on:
  push:
    branches:
      - main
    paths:
      - 'CBKAssetConverter/**'
      - 'Common/**'

jobs:
  build:
    name: Build CBKAssetConverter (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zlib1g-dev

      - name: Download premake5
        run: |
          curl -sSL https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-linux.tar.gz | tar -xz -C .
          chmod +x ./premake5

      - name: Build
        run: ./premake5 gmake && make CBKAssetConverter config=release -j$(nproc)
