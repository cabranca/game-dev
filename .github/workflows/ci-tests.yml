name: CI - UnitTests

on:
  push:
    branches:
      - main
    paths:
      - 'UnitTests/**'
      - 'Cabrankengine/**'
      - 'Common/**'

jobs:
  build-and-test:
    name: Build & Run UnitTests (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxi-dev libxxf86vm-dev \
            libxcursor-dev libgl1-mesa-dev

      - name: Make premake5 executable
        run: chmod +x ./premake5

      - name: Build
        run: ./premake5 gmake && make UnitTests config=release -j$(nproc)

      - name: Run tests
        run: |
          export LD_LIBRARY_PATH="$LD_LIBRARY_PATH:./Cabrankengine/vendor/irrKlang/so"
          ./bin/Release-linux-x86_64/UnitTests/UnitTests
